<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>proof360 — live provenance</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23f2ede4'/><circle cx='16' cy='16' r='10' fill='none' stroke='%232d7f6e' stroke-width='2'/><circle cx='16' cy='16' r='3' fill='%232d7f6e'/></svg>">
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f2ede4;
      --bg-panel: #f7f3ec;
      --bg-card: #ffffff;
      --border: #e0d9ce;
      --border-strong: #c8c0b2;
      --text-primary: #2a221c;
      --text-secondary: #7c6e62;
      --text-muted: #b0a496;
      --accent: #2d7f6e;
      --accent-light: #e4f2ee;
      --error: #963030;
      --graph-bg: #f7f4ef;
    }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'IBM Plex Mono', 'Fira Code', monospace;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    #status-bar {
      background: var(--bg-card);
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    #wordmark {
      font-family: 'Spectral', Georgia, serif;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text-primary);
    }

    #wordmark em {
      font-style: italic;
      font-weight: 400;
      color: var(--accent);
    }

    .status-divider {
      width: 1px;
      height: 16px;
      background: var(--border);
      flex-shrink: 0;
    }

    #status-dot { color: var(--accent); font-size: 9px; }

    #status-text {
      font-size: 11px;
      color: var(--text-secondary);
      letter-spacing: 0.02em;
    }

    #replay-btn {
      background: transparent;
      border: 1px solid var(--border-strong);
      color: var(--text-secondary);
      padding: 4px 12px;
      border-radius: 3px;
      font-family: inherit;
      font-size: 10px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      margin-left: auto;
    }

    #replay-btn:hover { border-color: var(--accent); color: var(--accent); }

    #panels { display: flex; flex: 1; overflow: hidden; }

    #graph-panel {
      flex: 1;
      background: var(--graph-bg);
      border-right: 1px solid var(--border);
      overflow: hidden;
    }

    #graph-panel svg { width: 100%; height: 100%; }

    #report-panel {
      width: 400px;
      background: var(--bg-panel);
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
    }

    .section-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-left: 3px solid transparent;
      border-radius: 4px;
      padding: 12px 14px;
      opacity: 0.45;
      transition: opacity 0.3s, border-left-color 0.3s;
    }

    .section-card.active { opacity: 1; border-left-color: var(--accent); }
    .section-card.active.error { border-left-color: var(--error); }

    .section-title {
      font-family: 'Spectral', Georgia, serif;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      margin-bottom: 7px;
    }

    .section-card.active .section-title { color: var(--accent); }

    .section-body {
      font-size: 12px;
      color: var(--text-primary);
      line-height: 1.55;
    }

    .section-body.skeleton {
      font-family: 'Spectral', Georgia, serif;
      font-style: italic;
      font-size: 11px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div id="status-bar">
    <span id="wordmark">proof<em>/360</em></span>
    <div class="status-divider"></div>
    <span id="status-dot">●</span>
    <span id="status-text">Starting scan...</span>
    <button id="replay-btn" onclick="startReplay()">Replay</button>
  </div>
  <div id="panels">
    <div id="graph-panel">
      <svg id="graph-svg">
        <defs>
          <symbol id="icon-api" viewBox="0 0 24 24">
            <rect x="9" y="2" width="6" height="10" rx="1" fill="none" stroke="currentColor" stroke-width="2"/>
            <line x1="7" y1="7" x2="4" y2="7" stroke="currentColor" stroke-width="2"/>
            <line x1="17" y1="7" x2="20" y2="7" stroke="currentColor" stroke-width="2"/>
            <path d="M6 12h12v6a3 3 0 01-3 3H9a3 3 0 01-3-3v-6z" fill="none" stroke="currentColor" stroke-width="2"/>
          </symbol>
          <symbol id="icon-model" viewBox="0 0 24 24">
            <polygon points="12,2 15,9 22,9 16.5,13.5 18.5,21 12,17 5.5,21 7.5,13.5 2,9 9,9" fill="none" stroke="currentColor" stroke-width="2"/>
          </symbol>
          <symbol id="icon-mcp" viewBox="0 0 24 24">
            <polygon points="12,2 20,7 20,17 12,22 4,17 4,7" fill="none" stroke="currentColor" stroke-width="2"/>
          </symbol>
          <symbol id="icon-document" viewBox="0 0 24 24">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" fill="none" stroke="currentColor" stroke-width="2"/>
            <polyline points="14,2 14,8 20,8" fill="none" stroke="currentColor" stroke-width="2"/>
          </symbol>
          <symbol id="icon-entity" viewBox="0 0 24 24">
            <rect x="3" y="3" width="18" height="18" rx="2" fill="none" stroke="currentColor" stroke-width="2"/>
            <line x1="3" y1="9" x2="21" y2="9" stroke="currentColor" stroke-width="1.5"/>
            <line x1="9" y1="9" x2="9" y2="21" stroke="currentColor" stroke-width="1.5"/>
          </symbol>
          <symbol id="icon-spv" viewBox="0 0 24 24">
            <line x1="2" y1="20" x2="22" y2="20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <rect x="5" y="8" width="3" height="12" fill="none" stroke="currentColor" stroke-width="1.5"/>
            <rect x="10.5" y="8" width="3" height="12" fill="none" stroke="currentColor" stroke-width="1.5"/>
            <rect x="16" y="8" width="3" height="12" fill="none" stroke="currentColor" stroke-width="1.5"/>
            <polygon points="12,2 22,8 2,8" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
          </symbol>
        </defs>
      </svg>
    </div>
    <div id="report-panel"></div>
  </div>

  <script>
    const statusText = document.getElementById('status-text');
    const statusDot = document.getElementById('status-dot');
    const reportPanel = document.getElementById('report-panel');

    const SECTIONS = [
      { id: 'company_snapshot',  title: 'Company Snapshot' },
      { id: 'email_security',    title: 'Email Security' },
      { id: 'tls',               title: 'TLS / Certificate' },
      { id: 'breach',            title: 'Data Breach History' },
      { id: 'web_intelligence',  title: 'Web Intelligence' },
      { id: 'signal_extraction', title: 'Signal Extraction' },
      { id: 'evidence_sources',  title: 'Evidence Sources' },
      { id: 'trust_gaps',        title: 'Trust Gaps' },
      { id: 'programs',          title: 'AWS Programs' },
      { id: 'spv_context',       title: 'SPV Context' },
    ];

    let nodes = [];
    let edges = [];
    let sim;

    const NODE_COLOURS = {
      entity:   '#64748b',
      api:      '#0891b2',
      model:    '#6366f1',
      mcp:      '#d97706',
      document: '#ea580c',
      spv:      '#059669',
    };
    const NODE_R = 32;

    // Demo favicon mapping — uses Google's public service so no server needed
    const FAVICON_DOMAINS = {
      firecrawl:    'firecrawl.dev',
      perplexity:   'perplexity.ai',
      aws_programs: 'aws.amazon.com',
      github:       'github.com',
      hibp:         'haveibeenpwned.com',
      abuseipdb:    'abuseipdb.com',
      ssl:          'ssllabs.com',
    };

    function faviconFor(node) {
      if (node.id === 'entity' && node.label && node.label !== 'Target')
        return `https://logo.clearbit.com/${encodeURIComponent(node.label)}`;
      const d = FAVICON_DOMAINS[node.id];
      return d ? `https://logo.clearbit.com/${d}` : null;
    }

    function initReport() {
      reportPanel.innerHTML = '';
      for (const s of SECTIONS) {
        const card = document.createElement('div');
        card.className = 'section-card';
        card.id = `section-${s.id}`;
        card.innerHTML = `<div class="section-title">${s.title}</div><div class="section-body skeleton">—</div>`;
        reportPanel.appendChild(card);
      }
    }

    function upsertNode(id, nodeType, label, status) {
      const existing = nodes.find(n => n.id === id);
      if (existing) { existing.status = status; existing.nodeType = nodeType; existing.label = label; }
      else nodes.push({ id, nodeType, label, status });
    }

    function fillSection(sectionId, content) {
      const card = document.getElementById(`section-${sectionId}`);
      if (!card) return;
      card.classList.add('active');
      card.querySelector('.section-body').classList.remove('skeleton');
      card.querySelector('.section-body').textContent = content.summary ?? JSON.stringify(content);
    }

    function renderGraph() {
      const svgEl = d3.select('#graph-svg');
      const W = svgEl.node().clientWidth || 800;
      const H = svgEl.node().clientHeight || 600;

      svgEl.selectAll('g').remove();
      const g = svgEl.append('g');

      for (const n of nodes) {
        if (n.x === undefined) {
          n.x = W / 2 + (Math.random() - 0.5) * W * 0.7;
          n.y = H / 2 + (Math.random() - 0.5) * H * 0.7;
        }
      }

      if (!sim) {
        sim = d3.forceSimulation()
          .force('link', d3.forceLink().id(d => d.id).distance(200))
          .force('charge', d3.forceManyBody().strength(-800))
          .force('center', d3.forceCenter(W / 2, H / 2))
          .force('collide', d3.forceCollide(NODE_R + 24))
          .force('y', d3.forceY(H / 2).strength(0.02))
          .alphaDecay(0.015);
      } else {
        sim.force('center', d3.forceCenter(W / 2, H / 2));
        sim.force('collide', d3.forceCollide(NODE_R + 24));
      }

      sim.nodes(nodes);
      sim.force('link').links(edges);
      sim.alpha(0.5).restart();

      const defs = svgEl.select('defs');
      if (defs.select('#arrow').empty()) {
        defs.append('marker')
          .attr('id', 'arrow').attr('viewBox', '0 0 10 10')
          .attr('refX', 8).attr('refY', 5)
          .attr('markerWidth', 6).attr('markerHeight', 6)
          .attr('orient', 'auto-start-reverse')
          .append('path').attr('d', 'M 0 0 L 10 5 L 0 10 z').attr('fill', '#c8c0b2');
      }

      const linkSel = g.append('g')
        .selectAll('line').data(edges).join('line')
        .attr('stroke', '#d4cec6').attr('stroke-width', 1.5)
        .attr('marker-end', 'url(#arrow)');

      const nodeSel = g.append('g')
        .selectAll('g.nd').data(nodes).join(
          enter => {
            const ng = enter.append('g').attr('class', 'nd');
            ng.append('circle').attr('r', NODE_R).attr('fill', '#ffffff');
            ng.append('use').attr('width', 28).attr('height', 28).attr('x', -14).attr('y', -14);
            ng.append('image').attr('width', 28).attr('height', 28).attr('x', -14).attr('y', -14)
              .attr('clip-path', 'url(#favicon-clip)').attr('display', 'none');
            ng.append('text').attr('y', NODE_R + 16).attr('text-anchor', 'middle')
              .attr('font-size', 10).attr('fill', '#7c6e62').attr('font-family', 'IBM Plex Mono, monospace');
            return ng;
          }
        );

      if (defs.select('#favicon-clip').empty()) {
        defs.append('clipPath').attr('id', 'favicon-clip')
          .append('circle').attr('r', 14);
      }

      nodeSel.select('circle')
        .attr('stroke', d => d.status === 'error' ? '#963030' : (NODE_COLOURS[d.nodeType] ?? '#64748b'))
        .attr('stroke-width', d => d.status === 'loading' ? 1.5 : 2)
        .attr('opacity', d => d.status === 'loading' ? 0.45 : 1);

      nodeSel.select('use')
        .attr('href', d => `#icon-${d.nodeType}`)
        .attr('color', d => d.status === 'error' ? '#963030' : (NODE_COLOURS[d.nodeType] ?? '#64748b'))
        .attr('opacity', d => d.status === 'loading' ? 0.45 : 1)
        .attr('display', d => faviconFor(d) ? 'none' : null);

      nodeSel.select('image')
        .attr('href', d => faviconFor(d) ?? '')
        .attr('opacity', d => d.status === 'loading' ? 0.45 : 1)
        .attr('display', d => faviconFor(d) ? null : 'none');

      nodeSel.select('text').text(d => d.label);

      sim.on('tick', () => {
        linkSel
          .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
          .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
        nodeSel.attr('transform', d => `translate(${d.x ?? W/2},${d.y ?? H/2})`);
      });
    }

    function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

    async function startReplay() {
      // Reset state
      nodes = [{ id: 'entity', nodeType: 'entity', label: 'acmecorp.io', status: 'active' }];
      edges = [];
      sim = null;
      initReport();
      statusDot.textContent = '●';
      renderGraph();
      await delay(800);

      // ── QUICK ────────────────────────────────────────────────────────────
      statusText.textContent = 'Quick scan — web & DNS';
      await delay(600);

      upsertNode('firecrawl', 'api', 'Firecrawl', 'loading'); renderGraph(); await delay(1200);
      upsertNode('firecrawl', 'api', 'Firecrawl', 'done'); renderGraph();
      edges.push({ source: 'entity', target: 'firecrawl' }); renderGraph();
      fillSection('company_snapshot', { summary: 'B2B SaaS · Series B · 120 employees · AU/US markets' });
      await delay(500);

      upsertNode('perplexity', 'model', 'Perplexity', 'loading'); renderGraph(); await delay(1800);
      upsertNode('perplexity', 'model', 'Perplexity', 'done'); renderGraph();
      edges.push({ source: 'entity', target: 'perplexity' }); renderGraph();
      fillSection('web_intelligence', { summary: 'No recent security incidents. $12M Series B announced March 2025.' });
      await delay(500);

      upsertNode('dns', 'api', 'DNS', 'loading'); renderGraph(); await delay(1000);
      upsertNode('dns', 'api', 'DNS', 'done'); renderGraph();
      edges.push({ source: 'entity', target: 'dns' }); renderGraph();
      fillSection('email_security', { summary: 'DMARC policy p=none — email spoofing possible. SPF configured.' });
      fillSection('tls', { summary: 'Grade A. TLS 1.3. 47 subdomains detected.' });
      fillSection('breach', { summary: '1 breach on record (2021, 3,400 accounts). Resolved.' });
      await delay(700);

      // ── STANDARD ─────────────────────────────────────────────────────────
      statusText.textContent = 'Standard — signal extraction';
      await delay(600);

      upsertNode('vector', 'model', 'VECTOR', 'loading'); renderGraph(); await delay(2200);
      upsertNode('vector', 'model', 'VECTOR', 'done'); renderGraph();
      edges.push({ source: 'firecrawl', target: 'vector' }); renderGraph();
      fillSection('signal_extraction', { summary: 'Stage: Series B · Sector: B2B SaaS · Cloud: AWS · Team: 120 · Handles PII: yes' });
      await delay(600);

      // ── INTERACTIVE ───────────────────────────────────────────────────────
      statusText.textContent = '⏳  Founder confirming details...';
      statusDot.textContent = '⏳';
      await delay(2500);
      statusDot.textContent = '●';

      // ── DEEP ─────────────────────────────────────────────────────────────
      statusText.textContent = 'Deep — evidence & gap analysis';
      await delay(600);

      upsertNode('corpus', 'mcp', 'CORPUS', 'loading'); renderGraph(); await delay(1400);
      upsertNode('corpus', 'mcp', 'CORPUS', 'done'); renderGraph();
      edges.push({ source: 'entity', target: 'corpus' }); renderGraph();
      fillSection('evidence_sources', { summary: '23 CORPUS entities matched. SOC 2 Type II benchmark loaded.' });
      await delay(600);

      upsertNode('gap_analysis', 'model', 'Gap Analysis', 'loading'); renderGraph(); await delay(2000);
      upsertNode('gap_analysis', 'model', 'Gap Analysis', 'done'); renderGraph();
      edges.push({ source: 'vector', target: 'gap_analysis' }); renderGraph();
      fillSection('trust_gaps', { summary: '4 gaps: DMARC enforcement (high), Pen test (high), AI governance (medium), Backup DR (medium)' });
      await delay(500);

      upsertNode('aws_programs', 'model', 'AWS Programs', 'loading'); renderGraph(); await delay(800);
      upsertNode('aws_programs', 'model', 'AWS Programs', 'done'); renderGraph();
      edges.push({ source: 'entity', target: 'aws_programs' }); renderGraph();
      fillSection('programs', { summary: 'Eligible: AWS Activate (credits), AWS ISV Accelerate (co-sell)' });
      await delay(600);

      upsertNode('spv', 'spv', 'SPV Context', 'loading'); renderGraph(); await delay(1000);
      upsertNode('spv', 'spv', 'SPV Context', 'done'); renderGraph();
      edges.push({ source: 'entity', target: 'spv' }); renderGraph();
      fillSection('spv_context', { summary: 'Stage: Series B · Geography: AU/US · ARR: ~$2M inferred · Handles PII: yes · Sector: B2B SaaS' });
      await delay(600);

      // ── DONE ─────────────────────────────────────────────────────────────
      statusDot.textContent = '✓';
      statusText.textContent = 'Done — scan complete';
    }

    // Auto-start on load
    initReport();
    nodes = [{ id: 'entity', nodeType: 'entity', label: 'acmecorp.io', status: 'active' }];
    renderGraph();
    setTimeout(startReplay, 800);
  </script>
</body>
</html>
