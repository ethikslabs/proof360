server {
    listen 80;
    server_name proof360.au www.proof360.au;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name proof360.au www.proof360.au;

    ssl_certificate     /etc/nginx/ssl/proof360/chain.crt;
    ssl_certificate_key /etc/nginx/ssl/proof360/origin.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /home/ec2-user/proof360/frontend/dist;
    index index.html;

    location /api/ {
        proxy_pass http://localhost:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 30s;
    }

    location /public/ {
        alias /home/ec2-user/proof360/public/;
        add_header Cache-Control no-cache;
    }

    location /ping {
        return 200 "proof360 ok";
        add_header Content-Type text/plain;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
