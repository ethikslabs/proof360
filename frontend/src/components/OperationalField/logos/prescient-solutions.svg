<svg viewBox="0 0 210 46" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="psg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#5B21B6"/>
      <stop offset="55%"  stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#D946EF"/>
    </linearGradient>
  </defs>
  <!-- Triangle frame -->
  <polygon points="4,42 24,4 44,42" fill="none" stroke="url(#psg)" stroke-width="2" stroke-linejoin="round"/>
  <!-- Internal network edges -->
  <line x1="4"  y1="42" x2="34" y2="23" stroke="url(#psg)" stroke-width="1.4" opacity="0.75"/>
  <line x1="44" y1="42" x2="14" y2="23" stroke="url(#psg)" stroke-width="1.4" opacity="0.75"/>
  <line x1="24" y1="4"  x2="24" y2="42" stroke="url(#psg)" stroke-width="1.4" opacity="0.75"/>
  <line x1="14" y1="23" x2="34" y2="23" stroke="url(#psg)" stroke-width="1.4" opacity="0.6"/>
  <!-- Nodes -->
  <circle cx="4"  cy="42" r="3.2" fill="#5B21B6"/>
  <circle cx="24" cy="4"  r="3.2" fill="#7C3AED"/>
  <circle cx="44" cy="42" r="3.2" fill="#D946EF"/>
  <circle cx="14" cy="23" r="2.6" fill="#8B5CF6"/>
  <circle cx="34" cy="23" r="2.6" fill="#C026D3"/>
  <circle cx="24" cy="42" r="2.4" fill="#A855F7"/>
  <circle cx="24" cy="23" r="2.0" fill="#9333EA"/>
  <!-- Wordmark -->
  <text x="56" y="21" font-family="-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="13" font-weight="700" fill="#5B21B6" letter-spacing="0.2">prescient</text>
  <text x="56" y="37" font-family="-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="13" font-weight="400" fill="#7C3AED" letter-spacing="0.2">solutions</text>
</svg>
